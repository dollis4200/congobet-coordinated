name: congobet-coordinated

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: congobet-coordinated
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run coordinated scraper
        env:
          TZ: 'UTC'
          CONGOBET_MATCHES_URL: 'https://www.congobet.net/virtual/category/instant-league/8035/matches'
          CONGOBET_RESULTS_URL: 'https://www.congobet.net/virtual/category/instant-league/8035/results'
        run: python scripts/congobet_coordinator.py

      - name: Commit updated files
        run: |
          if git diff --quiet -- .; then
            echo "No data change to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add congobet_combined_odds.json cbet_results.json archive data
          git commit -m "chore: CongoBet sync $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || exit 0
          git push
